server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/eca_product_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 199884
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  #        format_sql: true

  cloud:
    gcp:
      storage:
        bucket-name: eca-product-images
        project-id: your-gcp-project-id
        credentials:
          location: classpath:gcp-credentials.json

eureka:
  client:
    service-url:
      defaultZone: http://localhost:9001/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
