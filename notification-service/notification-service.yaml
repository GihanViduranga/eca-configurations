server:
  port: 8083

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/eca_notification_db
      database: eca_notification_db

eureka:
  client:
    service-url:
      defaultZone: http://localhost:9001/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
